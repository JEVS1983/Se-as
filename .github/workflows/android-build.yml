name: Build AAB Android

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repo
        uses: actions/checkout@v4

      - name: ☕ Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🔧 Dar permisos a gradlew
        run: chmod +x gradlew

      - name: 🧹 Limpiar proyecto
        run: ./gradlew clean

      - name: ⚙️ Build AAB
        run: ./gradlew bundleRelease

      - name: 📤 Subir AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/bundle/release/app-release.aab
